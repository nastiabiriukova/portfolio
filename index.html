<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ana Biriukova — UI/UX Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="preload" as="image" href="https://www.figma.com/api/mcp/asset/f354a8ce-fc48-415c-80ef-ad2eb8be538d" fetchpriority="high" />
  <link rel="preload" as="image" href="https://www.figma.com/api/mcp/asset/ac0b9208-cc15-4d25-a000-e08d7edb4fe6" fetchpriority="high" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.10/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/framer-motion@11.18.2/dist/framer-motion.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: #0F0F0F;
      color: #fff;
      font-family: 'Inter Tight', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    a { text-decoration: none; color: inherit; }
    img { display: block; max-width: 100%; }
    button { border: none; background: none; cursor: pointer; font-family: inherit; }

    /* ---- Layout ---- */
    .page { display: flex; flex-direction: column; min-height: 100vh; }

    /* ---- Header ---- */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center;
      padding: 40px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      background: rgba(15,15,15,0.6);
      height: 113px;
    }
    .header-logo {
      flex: 1; min-width: 1px;
      font-family: 'Kunstler Script', 'Brush Script MT', cursive;
      font-size: 40px; line-height: 1.4; font-weight: 400;
    }
    .header-nav { flex: 1; min-width: 1px; display: flex; gap: 16px; align-items: center; }
    .header-nav a {
      font-weight: 500; font-size: 16px; letter-spacing: -0.16px;
      line-height: 1.45; padding-bottom: 4px;
      position: relative;
    }
    .header-nav a::after {
      content: ''; position: absolute; bottom: 0; left: 0;
      width: 0; height: 1px; background: #fff;
      transition: width 0.3s ease;
    }
    .header-nav a:hover::after { width: 100%; }

    /* ---- Hero ---- */
    .hero {
      padding-top: 193px;
      display: flex; flex-direction: column; gap: 124px;
      align-items: center;
      padding-left: 40px; padding-right: 40px;
      padding-bottom: 120px;
    }
    .hero-top {
      display: flex; align-items: flex-start;
      width: 100%; gap: 0; flex-wrap: wrap;
    }
    .hero-top > div { flex: 1; min-width: 300px; }
    .hero-mail {
      display: inline-flex; align-items: center; gap: 4px;
      font-weight: 500; font-size: 24px; color: #fff;
      position: relative;
    }
    .hero-mail svg { width: 20px; height: 20px; flex-shrink: 0; }
    .hero-mail::after {
      content: ''; position: absolute; bottom: -2px; left: 24px;
      width: 0; height: 1px; background: #fff;
      transition: width 0.35s ease;
    }
    .hero-mail:hover::after { width: calc(100% - 24px); }
    .hero-bio {
      font-weight: 500; font-size: 32px; line-height: 1.25;
      letter-spacing: -0.64px;
    }
    .hero-name {
      display: flex; flex-wrap: wrap; justify-content: center; align-items: baseline;
      gap: 0.15em; width: 100%; text-transform: uppercase;
      font-weight: 500; letter-spacing: -0.01em; text-align: center;
    }
    .hero-name span { font-size: clamp(80px, 13.2vw, 190px); line-height: 0.87; }

    /* ---- Cases ---- */
    .cases {
      padding: 0 40px 120px;
      display: flex; flex-direction: column; gap: 48px;
    }
    .cases-row {
      display: flex; gap: 24px; flex-wrap: wrap;
    }
    .case-card {
      flex: 1; min-width: 340px;
      display: flex; flex-direction: column; gap: 24px;
      cursor: pointer;
    }
    .case-img-wrap {
      position: relative; width: 100%;
      padding-bottom: 65%; /* ~434/668 */
      border-radius: 4px; overflow: hidden;
      background: #1a1a1a;
    }
    .case-img-wrap img {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .case-card:hover .case-img-wrap img { transform: scale(1.04); }
    .case-nda-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(60px, 9vw, 132px); font-weight: 500;
      text-transform: uppercase; letter-spacing: -1.32px; color: #fff;
    }
    .case-ecommerce-wrap {
      position: relative; width: 100%;
      padding-bottom: 65%;
      border-radius: 4px; overflow: hidden;
      display: flex; gap: 10.77px;
      background: #1a1a1a;
    }
    .case-ecommerce-wrap .ec-left {
      position: absolute; left: 0; top: 0; bottom: 0; width: 48.5%;
    }
    .case-ecommerce-wrap .ec-left img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .case-ecommerce-wrap .ec-right {
      position: absolute; right: 0; top: 0; bottom: 0; width: 49.1%;
      background: linear-gradient(90deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.05) 100%), #f5f5f5;
      display: flex; align-items: center; justify-content: center;
    }
    .case-ecommerce-wrap .ec-right img {
      height: 70%; width: auto; object-fit: contain;
      transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .case-card:hover .case-ecommerce-wrap img { transform: scale(1.04); }
    .case-info {
      display: flex; justify-content: space-between; align-items: flex-start;
      font-weight: 500; font-size: 16px; letter-spacing: -0.16px; line-height: 1.45;
    }
    .case-desc { max-width: 75%; color: #fff; }
    .case-year { color: #9F9F9F; white-space: nowrap; text-align: right; }

    /* ---- Posters ---- */
    .posters {
      padding: 0 130px 120px;
      display: flex; flex-direction: column; gap: 80px; align-items: center;
    }
    .posters-title {
      font-weight: 500; font-size: clamp(36px, 5vw, 72px);
      line-height: 1.1; letter-spacing: -1.44px; text-align: center;
    }
    .posters-grid { display: flex; flex-direction: column; gap: 80px; width: 100%; }
    .poster-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .poster-row:not(.reverse) { padding-right: 124px; }
    .poster-row.reverse { flex-direction: row-reverse; padding-left: 124px; }
    .poster-img {
      border-radius: 4px; overflow: hidden; width: 100%;
    }
    .poster-img img {
      display: block; width: 100%;
      transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .poster-row:hover .poster-img img { transform: scale(1.03); }
    .poster-text {
      font-size: 16px; line-height: 1.45; letter-spacing: -0.16px;
      width: 275px; flex-shrink: 0; font-weight: 500;
    }

    /* ---- Footer ---- */
    .footer {
      background: #0F0F0F;
      padding: 40px;
      display: flex; flex-direction: column; gap: 127px;
    }
    .footer-top {
      display: flex; flex-wrap: wrap; gap: 64px 24px;
    }
    .footer-cta {
      flex: 1; min-width: 466px;
      font-weight: 500; font-size: clamp(80px, 12.8vw, 184px);
      text-transform: uppercase; line-height: 0.87; letter-spacing: -3.68px;
      height: 288px; display: flex; flex-direction: column; justify-content: center;
    }
    .footer-right {
      flex: 1; min-width: 307px; height: 288px;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    .footer-socials { display: flex; flex-wrap: wrap; gap: 8px; }
    .social-link {
      display: inline-flex; align-items: center; gap: 4px;
      border-radius: 54px; padding: 8px 12px;
      font-weight: 500; font-size: 16px; letter-spacing: -0.16px;
      transition: background 0.3s, color 0.3s, border-color 0.3s;
    }
    .social-link.filled {
      background: #fff; color: #0F0F0F;
    }
    .social-link.filled:hover { background: #ddd; }
    .social-link.outlined {
      border: 1px solid #fff; color: #fff;
    }
    .social-link.outlined:hover { background: #fff; color: #0F0F0F; }
    .social-link svg { width: 16px; height: 16px; flex-shrink: 0; }
    .footer-availability {
      font-weight: 500; font-size: 32px; line-height: 1.24;
      letter-spacing: -0.64px;
    }
    .footer-bottom {
      display: flex; justify-content: space-between; align-items: center;
      font-weight: 400; font-size: 16px; line-height: 1.53;
      color: #9F9F9F;
    }

    /* ---- Responsive ---- */
    @media (max-width: 1024px) {
      .header { padding: 24px 30px; height: 80px; }
      .hero { padding-top: 140px; gap: 80px; padding-left: 30px; padding-right: 30px; padding-bottom: 80px; }
      .hero-bio { font-size: 26px; }
      .cases { padding: 0 30px 80px; }
      .posters { padding: 0 40px 80px; }
      .poster-row:not(.reverse) { padding-right: 60px; }
      .poster-row.reverse { padding-left: 60px; }
      .poster-text { width: 240px; }
      .footer { padding: 30px; gap: 80px; }
      .footer-availability { font-size: 26px; }
    }
    @media (max-width: 768px) {
      .header { padding: 16px 20px; height: 64px; }
      .header-logo { font-size: 32px; }
      .header-nav { gap: 12px; }
      .header-nav a { font-size: 14px; }
      .hero { padding-top: 110px; gap: 48px; padding-left: 20px; padding-right: 20px; padding-bottom: 60px; }
      .hero-top { flex-direction: column; gap: 24px; }
      .hero-bio { font-size: 22px; min-width: 100%; }
      .hero-mail { font-size: 18px; }
      .cases { padding: 0 20px 60px; gap: 32px; }
      .cases-row { flex-direction: column; }
      .case-card { min-width: 100%; }
      .case-desc { max-width: 85%; }
      .posters { padding: 0 20px 60px; gap: 48px; }
      .poster-row, .poster-row.reverse { flex-direction: column; gap: 24px; padding: 0 !important; }
      .poster-row > div { width: 100% !important; max-width: 100% !important; }
      .poster-text { width: 100% !important; }
      .footer { padding: 20px; gap: 60px; }
      .footer-cta { letter-spacing: -2px; min-width: 100%; height: auto; }
      .footer-right { height: auto; gap: 32px; }
      .footer-availability { font-size: 22px; }
      .footer-bottom { flex-direction: column; gap: 8px; align-items: flex-start; }
    }
    @media (max-width: 480px) {
      .header-nav a:not(:first-child) { display: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { motion, useInView, useAnimation, AnimatePresence } = window["framer-motion"] || window.Motion;
    const { useRef, useEffect, useState } = React;

    /* ========== ASSETS ========== */
    /* Replace these URLs with your permanent image paths */
    const ASSETS = {
      case1: "assets/ipmind-cover.webp",
      case2Main: "assets/ecommerce-cover.webp",
      case2Phone: "assets/ecommerce-cover.webp",
      case3Nda: "assets/nda-cover.webp",
      case4: "assets/medcare-cover.webp",
      poster1: "assets/poster-1.webp",
      poster2: "assets/poster-2.webp",
      poster3: "assets/poster-3.webp",
    };

    /* ========== ANIMATION HELPERS ========== */
    const fadeUp = {
      hidden: { opacity: 0, y: 40 },
      visible: (i = 0) => ({
        opacity: 1, y: 0,
        transition: { duration: 0.7, ease: [0.22, 1, 0.36, 1], delay: i * 0.12 }
      })
    };

    const fadeIn = {
      hidden: { opacity: 0 },
      visible: (i = 0) => ({
        opacity: 1,
        transition: { duration: 0.6, ease: "easeOut", delay: i * 0.1 }
      })
    };

    const scaleIn = {
      hidden: { opacity: 0, scale: 0.95 },
      visible: (i = 0) => ({
        opacity: 1, scale: 1,
        transition: { duration: 0.8, ease: [0.22, 1, 0.36, 1], delay: i * 0.15 }
      })
    };

    const slideFromLeft = {
      hidden: { opacity: 0, x: -60 },
      visible: { opacity: 1, x: 0, transition: { duration: 0.8, ease: [0.22, 1, 0.36, 1] } }
    };

    const slideFromRight = {
      hidden: { opacity: 0, x: 60 },
      visible: { opacity: 1, x: 0, transition: { duration: 0.8, ease: [0.22, 1, 0.36, 1] } }
    };

    function ScrollReveal({ children, variants = fadeUp, custom = 0, threshold = 0.15, style, className }) {
      const ref = useRef(null);
      const isInView = useInView(ref, { once: true, amount: threshold });
      return (
        <motion.div
          ref={ref}
          initial="hidden"
          animate={isInView ? "visible" : "hidden"}
          variants={variants}
          custom={custom}
          style={style}
          className={className}
        >
          {children}
        </motion.div>
      );
    }

    /* ========== ICONS ========== */
    function MailIcon({ color = "#fff", size = 20 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 20 20" fill="none">
          <path d="M2.5 6.667l6.875 4.583a1.25 1.25 0 001.25 0L17.5 6.667M4.167 15.833h11.666A1.667 1.667 0 0017.5 14.167V5.833A1.667 1.667 0 0015.833 4.167H4.167A1.667 1.667 0 002.5 5.833v8.334a1.667 1.667 0 001.667 1.666z" stroke={color} strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      );
    }

    function DocIcon({ color = "#fff", size = 16 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 16 16" fill="none">
          <path d="M9.333 2v3.333h3.333M5.333 8h5.334M5.333 10.667h5.334M4 14h8a1.333 1.333 0 001.333-1.333V5.333L9.667 2H4A1.333 1.333 0 002.667 3.333v9.334A1.333 1.333 0 004 14z" stroke={color} strokeWidth="1" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      );
    }

    function DribbbleIcon({ color = "#fff", size = 16 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="6" stroke={color} strokeWidth="1"/>
          <path d="M2.5 5.8c2.5.8 5.2.6 7.5-.8M3 11c1.8-2 4.5-3.2 7.2-2.8M6.5 2.2c-.5 3 .2 6.2 2 8.8" stroke={color} strokeWidth="1" strokeLinecap="round"/>
        </svg>
      );
    }

    function LinkedInIcon({ color = "#fff", size = 16 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 16 16" fill="none">
          <path d="M4.667 6.667v5.333M4.667 4h.007M8 12V8.667c0-1.105.895-2 2-2s2 .895 2 2V12M8 12V6.667" stroke={color} strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/>
          <rect x="1.5" y="1.5" width="13" height="13" rx="2" stroke={color} strokeWidth="1"/>
        </svg>
      );
    }

    /* ========== HEADER ========== */
    function Header() {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 50);
        window.addEventListener("scroll", onScroll);
        return () => window.removeEventListener("scroll", onScroll);
      }, []);

      return (
        <motion.header
          className="header"
          initial={{ y: -113 }}
          animate={{ y: 0 }}
          transition={{ duration: 0.7, ease: [0.22, 1, 0.36, 1], delay: 0.1 }}
          style={{ boxShadow: scrolled ? "0 1px 0 rgba(255,255,255,0.06)" : "none" }}
        >
          <motion.div
            className="header-logo"
            initial={{ opacity: 0 }}
            animate={{ opacity: 1 }}
            transition={{ duration: 0.5, delay: 0.5 }}
          >
            AB
          </motion.div>
          <nav className="header-nav">
            {["Cases", "Posters", "Contact"].map((label, i) => (
              <motion.a
                key={label}
                href={`#${label.toLowerCase()}`}
                initial={{ opacity: 0, y: -10 }}
                animate={{ opacity: 1, y: 0 }}
                transition={{ duration: 0.4, delay: 0.6 + i * 0.08 }}
              >
                {label === "Cases" ? "Сases" : label}
              </motion.a>
            ))}
          </nav>
        </motion.header>
      );
    }

    /* ========== HERO ========== */
    function Hero() {
      return (
        <section className="hero">
          <div className="hero-top">
            <ScrollReveal custom={0}>
              <a className="hero-mail" href="mailto:nastia.biriukova@gmail.com">
                <MailIcon /> mail me
              </a>
            </ScrollReveal>
            <ScrollReveal custom={1}>
              <p className="hero-bio">
                UI/UX Designer based in Berlin with 3+ years of experience creating digital products for startups and growing businesses.
              </p>
            </ScrollReveal>
          </div>
          <div className="hero-name">
            <motion.span
              initial={{ opacity: 0, y: 80 }}
              animate={{ opacity: 1, y: 0 }}
              transition={{ duration: 1, ease: [0.22, 1, 0.36, 1], delay: 0.3 }}
            >
              Ana
            </motion.span>
            <motion.span
              initial={{ opacity: 0, y: 80 }}
              animate={{ opacity: 1, y: 0 }}
              transition={{ duration: 1, ease: [0.22, 1, 0.36, 1], delay: 0.45 }}
            >
              BIRIUKOVA
            </motion.span>
          </div>
        </section>
      );
    }

    /* ========== CASE CARD ========== */
    function CaseCard({ image, description, year, children, delay = 0, href, priority }) {
      const inner = (
        <ScrollReveal variants={scaleIn} custom={delay} className="case-card" threshold={0.1}>
          {children || (
            <div className="case-img-wrap">
              <img src={image} alt="" loading={priority ? "eager" : "lazy"} decoding="async" fetchpriority={priority ? "high" : "auto"} />
            </div>
          )}
          <div className="case-info">
            <p className="case-desc">{description}</p>
            <span className="case-year">{year}</span>
          </div>
        </ScrollReveal>
      );
      if (href) return <a href={href} style={{ textDecoration: "none", color: "inherit", display: "contents" }}>{inner}</a>;
      return inner;
    }

    /* ========== CASES ========== */
    function Cases() {
      return (
        <section className="cases" id="cases">
          <div className="cases-row">
            <CaseCard
              image={ASSETS.case1}
              description="Led the product design of an AI-powered legal platform that streamlines patent essentiality analysis for attorneys."
              year="2026"
              delay={0}
              href="ipmind.html"
              priority
            />
            <CaseCard
              description="Crafted a connected B2C and B2B insurance platform that simplifies policy management, improves advisor workflows, and helps users make informed coverage decisions."
              year="2026"
              delay={1}
            >
            <div className="case-img-wrap">
  <img src={ASSETS.case3Nda} alt="" loading="lazy" decoding="async" />
</div>
             
            </CaseCard>
          </div>
          <div className="cases-row">
            <CaseCard
              description="Created an e-commerce platform for organic and seasonal fruits, designed to deliver a seamless shopping experience across mobile and desktop."
              year="2025"
              delay={0}
              href="ecommerce.html"
            >
              <div className="case-img-wrap">
  <img src={ASSETS.case2Main} alt="" loading="lazy" decoding="async" />
</div>
            </CaseCard>
            <CaseCard
              image={ASSETS.case4}
              description="Designed a healthcare management platform that simplifies administrative tasks and improves access to patient information, enabling more efficient care delivery."
              year="2025"
              delay={1}
              href="medcare.html"
            />
          </div>
        </section>
      );
    }

    /* ========== POSTERS ========== */
    function Posters() {
      const posters = [
        {
          img: ASSETS.poster1,
          text: "A visual statement, that highlights the fragility of wildlife and the urgency of conservation efforts.",
          reverse: false,
          imgW: "508px",
          imgH: "619px",
        },
        {
          img: ASSETS.poster2,
          text: "An exploration of elegance, self-care, and premium aesthetics through refined typography and imagery.",
          reverse: true,
          imgW: "508px",
          imgH: "622px",
        },
        {
          img: ASSETS.poster3,
          text: "A concept focused on movement, form, and the intersection of fashion and contemporary visual culture.",
          reverse: false,
          imgW: "590px",
          imgH: "391px",
        },
      ];

      return (
        <section className="posters" id="posters">
          <ScrollReveal variants={fadeUp}>
            <h2 className="posters-title">Poster experiments</h2>
          </ScrollReveal>
          <div className="posters-grid">
            {posters.map((p, i) => (
              <div className={`poster-row ${p.reverse ? "reverse" : ""}`} key={i}>
                <ScrollReveal variants={p.reverse ? slideFromRight : slideFromLeft} threshold={0.2} style={{ width: p.imgW, maxWidth: '100%', flexShrink: 0 }}>
                  <div className="poster-img">
                    <img
                      src={p.img}
                      alt=""
                      width={parseInt(p.imgW)}
                      height={parseInt(p.imgH)}
                      loading="lazy"
                      decoding="async"
                    />
                  </div>
                </ScrollReveal>
                <ScrollReveal variants={p.reverse ? slideFromLeft : slideFromRight} custom={0} threshold={0.2} style={{ width: '275px', flexShrink: 0 }}>
                  <p className="poster-text">{p.text}</p>
                </ScrollReveal>
              </div>
            ))}
          </div>
        </section>
      );
    }

    /* ========== FOOTER ========== */
    function Footer() {
      return (
        <footer className="footer" id="contact">
          <div className="footer-top">
            <motion.div
              className="footer-cta"
              initial={{ opacity: 0, y: 60 }}
              whileInView={{ opacity: 1, y: 0 }}
              viewport={{ once: true, amount: 0.3 }}
              transition={{ duration: 0.9, ease: [0.22, 1, 0.36, 1] }}
            >
              let's<br/>talk
            </motion.div>
            <div className="footer-right">
              <ScrollReveal variants={fadeIn} custom={1} threshold={0.3}>
