<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freshfruit E-commerce — Case Study | Ana Biriukova</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.10/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/framer-motion@11.18.2/dist/framer-motion.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: #0F0F0F; color: #fff;
      font-family: 'Inter Tight', sans-serif;
      -webkit-font-smoothing: antialiased; overflow-x: hidden;
    }
    a { text-decoration: none; color: inherit; }
    img { display: block; max-width: 100%; }

    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center;
      padding: 40px; height: 113px;
      backdrop-filter: blur(8px); background: rgba(15,15,15,0.7);
    }
    .header-logo { flex: 1; min-width: 1px; font-family: 'Kunstler Script','Brush Script MT',cursive; font-size: 40px; line-height: 1.4; }
    .header-logo a { color: #fff; }
    .header-nav { flex: 1; min-width: 1px; display: flex; gap: 16px; align-items: center; }
    .header-nav a { font-weight: 500; font-size: 16px; letter-spacing: -0.16px; position: relative; padding-bottom: 4px; }
    .header-nav a::after { content:''; position: absolute; bottom: 0; left: 0; width: 0; height: 1px; background: #fff; transition: width 0.3s; }
    .header-nav a:hover::after { width: 100%; }

    .meta-bar {
      display: flex; padding: 40px 60px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .meta-item { flex: 1; }
    .meta-label { font-weight: 500; font-size: 16px; color: #9F9F9F; margin-bottom: 4px; letter-spacing: -0.16px; }
    .meta-value { font-weight: 500; font-size: 16px; color: #fff; letter-spacing: -0.16px; }

    .hero-img { width: 100%; aspect-ratio: 1440/767; background: #1a1a1a; overflow: hidden; }
    .hero-img img { width: 100%; height: 100%; object-fit: cover; }

    .content { padding: 0 60px; }
    .content-block { padding: 120px 0 0; display: flex; gap: 0; align-items: flex-start; }
    .content-block + .content-block { padding-top: 80px; }
    .cb-title { width: 33.33%; flex-shrink: 0; font-weight: 500; font-size: 32px; line-height: 1.25; letter-spacing: -0.64px; }
    .cb-title .num { display: inline; margin-right: 12px; color: #D56442; font-style: italic; }
    .cb-text { width: 66.66%; font-weight: 500; font-size: 16px; line-height: 1.45; letter-spacing: -0.16px; }
    .cb-text p + p { margin-top: 24px; }

    .img-block { margin: 60px 0 0; border-radius: 4px; overflow: hidden; background: #1a1a1a; }
    .img-block img { width: 100%; display: block; }
    .img-block.padded { margin-left: 60px; margin-right: 60px; }
    .img-placeholder {
      background: #1f1f1f; display: flex; align-items: center; justify-content: center;
      color: #9F9F9F; font-size: 14px; font-weight: 500; border-radius: 4px;
    }
    .bullet-list {
      list-style: none; padding: 0; margin: 0;
    }
    .bullet-list li {
      position: relative; padding-left: 16px;
      font-weight: 500; font-size: 16px; line-height: 1.45;
      letter-spacing: -0.16px;
    }
    .bullet-list li + li { margin-top: 8px; }
    .bullet-list li::before {
      content: ''; position: absolute; left: 0; top: 10px;
      width: 4px; height: 4px; border-radius: 50%;
      background: #9F9F9F;
    }

    .section-label-block { padding: 80px 60px 0; display: flex; align-items: flex-start; }
    .sl-label { width: 33.33%; font-weight: 500; font-size: 16px; letter-spacing: -0.16px; }
    .sl-text { width: 66.66%; font-weight: 500; font-size: 16px; line-height: 1.45; letter-spacing: -0.16px; }

    /* Quote cards */
    .quotes-row { display: flex; gap: 24px; padding: 0 60px; }
    .quote-card-sm {
      flex: 1; min-width: 0;
      background: transparent; border: 1px solid #4C4C4C; border-radius: 4px; padding: 32px;
      display: flex; flex-direction: column; justify-content: space-between;
      height: 346px;
    }
    .qc-text { font-style: normal; font-weight: 500; font-size: 24px; line-height: 1.25; }
    .qc-author { margin-bottom: auto; }
    .qc-name { font-weight: 400; font-size: 20px; line-height: 1.6; color: #BFBFBF; }

    /* Numbered cards */
    .cards-row { display: flex; gap: 24px; padding: 0 60px; }
    .num-card {
      flex: 1; min-width: 0; background: transparent; border: 1px solid #4C4C4C; border-radius: 4px;
      padding: 32px; display: flex; flex-direction: column; justify-content: space-between;
      height: 252px;
    }
    .num-card .nc-num { font-weight: 500; font-size: 24px; line-height: 1.25; }
    .num-card .nc-text { font-weight: 400; font-size: 20px; line-height: 1.6; margin-top: auto; }

    /* UI Kit grid */
    .ui-kit-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
      padding: 60px 60px 0;
    }
    .ui-kit-cell {
      background: #f5f5f5; border-radius: 8px; overflow: hidden;
    }

    /* Two-col image row */
    .img-row { display: flex; gap: 24px; padding: 60px 60px 0; }
    .img-row > div { flex: 1; border-radius: 4px; overflow: hidden; }

    .footer {
      margin-top: 120px; background: #0F0F0F; padding: 40px;
      display: flex; flex-direction: column; gap: 127px;
    }
    .footer-top { display: flex; flex-wrap: wrap; gap: 64px 24px; }
    .footer-cta { flex: 1; min-width: 466px; font-weight: 500; font-size: clamp(80px,12.8vw,184px); text-transform: uppercase; line-height: 0.87; letter-spacing: -3.68px; height: 288px; display: flex; flex-direction: column; justify-content: center; }
    .footer-right { flex: 1; min-width: 307px; height: 288px; display: flex; flex-direction: column; justify-content: space-between; }
    .footer-socials { display: flex; flex-wrap: wrap; gap: 8px; }
    .social-link { display: inline-flex; align-items: center; gap: 4px; border-radius: 54px; padding: 8px 12px; font-weight: 500; font-size: 16px; letter-spacing: -0.16px; transition: background 0.3s, color 0.3s; }
    .social-link.filled { background: #fff; color: #0F0F0F; }
    .social-link.filled:hover { background: #ddd; }
    .social-link.outlined { border: 1px solid #fff; color: #fff; }
    .social-link.outlined:hover { background: #fff; color: #0F0F0F; }
    .social-link svg { width: 16px; height: 16px; }
    .footer-availability { font-weight: 500; font-size: 32px; line-height: 1.24; letter-spacing: -0.64px; }
    .footer-bottom { display: flex; justify-content: space-between; font-weight: 400; font-size: 16px; color: #9F9F9F; }

    @media (max-width: 1024px) {
      .header { padding: 24px 30px; height: 80px; }
      .content { padding: 0 30px; }
      .meta-bar { padding: 30px; flex-wrap: wrap; gap: 20px; }
      .meta-item { min-width: 45%; }
      .content-block { flex-direction: column; gap: 24px; }
      .cb-title, .cb-text { width: 100%; }
      .section-label-block { padding-left: 30px; padding-right: 30px; flex-direction: column; gap: 16px; }
      .sl-label, .sl-text { width: 100%; }
      .quotes-row { padding: 40px 30px 0; }
      .cards-row { padding: 60px 30px 0; }
      .ui-kit-grid { padding: 40px 30px 0; }
      .img-row { padding: 40px 30px 0; }
      .img-block.padded { margin-left: 30px; margin-right: 30px; }
      .footer { padding: 30px; gap: 80px; }
      .footer-availability { font-size: 26px; }
    }
    @media (max-width: 768px) {
      .header { padding: 16px 20px; height: 64px; }
      .header-logo { font-size: 32px; }
      .content { padding: 0 20px; }
      .meta-bar { padding: 20px; }
      .meta-item { min-width: 100%; }
      .content-block { padding-top: 60px; }
      .cb-title { font-size: 26px; }
      .quotes-row { flex-direction: column; padding: 30px 20px 0; }
      .quote-card-sm { height: auto; min-height: 220px; }
      .cards-row { flex-direction: column; padding: 40px 20px 0; }
      .num-card { height: auto; min-height: 180px; }
      .ui-kit-grid { grid-template-columns: 1fr; padding: 30px 20px 0; }
      .img-row { flex-direction: column; padding: 30px 20px 0; }
      .img-block.padded { margin-left: 20px; margin-right: 20px; }
      .section-label-block { padding-left: 20px; padding-right: 20px; }
      .footer { padding: 20px; gap: 60px; }
      .footer-cta { min-width: 100%; height: auto; }
      .footer-right { height: auto; gap: 32px; }
      .footer-availability { font-size: 22px; }
      .footer-bottom { flex-direction: column; gap: 8px; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { motion, useInView } = window["framer-motion"] || window.Motion;
    const { useRef, useState, useEffect } = React;

    /* Image paths — save images in assets/ folder next to this HTML file */
    const ASSETS = {
      hero: "assets/ecommerce-hero.webp",
      showcase: "assets/ecommerce-showcase.webp",
      userflow: "assets/ecommerce-userflow.webp",
      uiColors: "assets/ecommerce-ui-colors.webp",
      uiTypography: "assets/ecommerce-ui-typography.webp",
      uiFonts: "assets/ecommerce-ui-fonts.webp",
      uiOranges: "assets/ecommerce-oranges-bag.webp",
      visualMobile: "assets/ecommerce-visual-mobile.webp",
      visualHero: "assets/ecommerce-visual-hero.webp",
      productPage: "assets/ecommerce-product-page.webp",
      blogPage: "assets/ecommerce-blog-page.webp",
    };

    const fadeUp = { hidden: { opacity:0, y:40 }, visible: (i=0)=>({ opacity:1, y:0, transition:{ duration:0.7, ease:[0.22,1,0.36,1], delay:i*0.12 }}) };
    const fadeIn = { hidden: { opacity:0 }, visible: (i=0)=>({ opacity:1, transition:{ duration:0.6, ease:"easeOut", delay:i*0.1 }}) };
    const scaleIn = { hidden: { opacity:0, scale:0.96 }, visible: (i=0)=>({ opacity:1, scale:1, transition:{ duration:0.8, ease:[0.22,1,0.36,1], delay:i*0.12 }}) };

    function SR({ children, variants=fadeUp, custom=0, threshold=0.15, style, className }) {
      const ref = useRef(null);
      const isInView = useInView(ref, { once:true, amount:threshold });
      return <motion.div ref={ref} initial="hidden" animate={isInView?"visible":"hidden"} variants={variants} custom={custom} style={style} className={className}>{children}</motion.div>;
    }

    function DocIcon() { return <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M9.333 2v3.333h3.333M5.333 8h5.334M5.333 10.667h5.334M4 14h8a1.333 1.333 0 001.333-1.333V5.333L9.667 2H4A1.333 1.333 0 002.667 3.333v9.334A1.333 1.333 0 004 14z" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round"/></svg>; }
    function MailIcon({ color="#0F0F0F" }) { return <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M2.5 6.667l6.875 4.583a1.25 1.25 0 001.25 0L17.5 6.667M4.167 15.833h11.666A1.667 1.667 0 0017.5 14.167V5.833A1.667 1.667 0 0015.833 4.167H4.167A1.667 1.667 0 002.5 5.833v8.334a1.667 1.667 0 001.667 1.666z" stroke={color} strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round"/></svg>; }
    function DribbbleIcon() { return <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="#fff"/><path d="M2.5 5.8c2.5.8 5.2.6 7.5-.8M3 11c1.8-2 4.5-3.2 7.2-2.8M6.5 2.2c-.5 3 .2 6.2 2 8.8" stroke="#fff" strokeLinecap="round"/></svg>; }
    function Placeholder({ ratio, label }) { return <div className="img-placeholder" style={{ aspectRatio:ratio, width:"100%" }}>{label || "Image"}</div>; }

    function Header() {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => { const h=()=>setScrolled(window.scrollY>50); window.addEventListener("scroll",h); return()=>window.removeEventListener("scroll",h); }, []);
      return (
        <motion.header className="header" initial={{y:-113}} animate={{y:0}} transition={{duration:0.7, ease:[0.22,1,0.36,1]}}>
          <div className="header-logo"><a href="index.html">AB</a></div>
          <nav className="header-nav">
            <a href="index.html#cases">Сases</a>
            <a href="index.html#posters">Posters</a>
            <a href="index.html#contact">Contact</a>
          </nav>
        </motion.header>
      );
    }

    function App() {
      return (
        <div>
          <Header />
          <div style={{ height: 113 }} />

          <SR variants={fadeIn}>
            <div className="meta-bar">
              {[["Industry","E-commerce"],["Role","UI/UX Designer"],["Team","1 dev · PM · Lead UI/UX Designer"],["Tools","Figma"]].map(([l,v],i)=>(
                <div className="meta-item" key={i}><div className="meta-label">{l}</div><div className="meta-value">{v}</div></div>
              ))}
            </div>
          </SR>

          <SR variants={scaleIn} threshold={0.1}>
            <div className="hero-img">
              <img src={ASSETS.hero} alt="Freshfruit hero" fetchpriority="high" />
            </div>
          </SR>

          {/* About / Challenge / Design process */}
          <div className="content">
            <SR variants={fadeUp}>
              <div className="content-block">
                <h2 className="cb-title">About the project</h2>
                <div className="cb-text">
                  <p>Freshfruit is an e-commerce platform that delivers seasonal, organic fruits directly to customers. This case study showcases my role as a UI/UX designer in creating a seamless, visually appealing, and conversion-focused user experience — from research and wireframing to final design.</p>
                </div>
              </div>
            </SR>
            <SR variants={fadeUp}>
              <div className="content-block" style={{paddingTop:80}}>
                <h2 className="cb-title">Challenge</h2>
                <div className="cb-text">
                  <p>Many online fruit shops suffer from outdated interfaces, unclear product presentation, and poor mobile usability. The goal was to design an intuitive and trustworthy shopping experience that:</p>
                  <ul className="bullet-list" style={{marginTop:16}}>
                    <li>Emphasizes freshness and quality</li>
                    <li>Streamlines product discovery and checkout</li>
                    <li>Encourages repeat purchases through personalization</li>
                  </ul>
                </div>
              </div>
            </SR>
            <SR variants={fadeUp}>
              <div className="content-block" style={{paddingTop:80}}>
                <h2 className="cb-title">Design process</h2>
                <div className="cb-text">
                  <ul className="bullet-list">
                    <li>UX research & Competitive analysis</li>
                    <li>User flow & Wireframes</li>
                    <li>High-fidelity UI Design (Mobile & Desktop)</li>
                    <li>UI Kit</li>
                    <li>Interaction prototyping in Figma</li>
                  </ul>
                </div>
              </div>
            </SR>
          </div>

          {/* Full-width image */}
          <SR variants={scaleIn} threshold={0.1}>
            <div className="img-block" style={{marginTop:60}}>
              <img src={ASSETS.showcase} alt="Product showcase" loading="lazy" decoding="async" style={{width:"100%",display:"block"}} />
            </div>
          </SR>

          {/* 01 UX Research */}
          <div style={{padding:"120px 60px 0", display:"flex", flexDirection:"column", gap:120}}>
            <SR variants={fadeUp}>
              <div style={{display:"flex", flexWrap:"wrap", alignItems:"center", justifyContent:"space-between", gap:"30px", minWidth:312}}>
                <h2 className="cb-title" style={{width:"auto", flexShrink:0}}><span className="num" style={{marginRight:8}}>01</span> UX research &amp; Insights</h2>
                <div style={{width:661, maxWidth:"100%", fontWeight:400, fontSize:20, lineHeight:1.6}}>
                  <p>I analyzed 3 real-world fruit delivery shops and conducted informal interviews with 5 frequent online grocery shoppers.</p>
                </div>
              </div>
            </SR>

            {/* Quote cards */}
            <div style={{display:"flex", gap:24}}>
              {[
                { text: "“I wish I could just filter by ‘seasonal’ or ‘organic’ and skip the rest.”", name: "Kate, Nutritionist" },
                { text: "“Give me a ready-made fruit mix—like something for smoothies or breakfasts.”", name: "Peter, Fitness enthusiast" },
                { text: "“I got all the way to checkout before finding out some items were unavailable.”", name: "Alexa, Working parent" },
              ].map((q, i) => (
                <SR key={i} variants={fadeUp} custom={i} style={{ flex:1, minWidth:0, display:"flex" }}>
                  <div className="quote-card-sm">
                    <div className="qc-author">
                      <span className="qc-name">{q.name}</span>
                    </div>
                    <p className="qc-text">{q.text}</p>
                  </div>
                </SR>
              ))}
            </div>
          </div>

          {/* 02 User flow */}
          <div className="content">
            <SR variants={fadeUp}>
              <div className="content-block">
                <h2 className="cb-title"><span className="num" style={{marginRight:12}}>02</span>User flow</h2>
              </div>
            </SR>
          </div>
          <SR variants={scaleIn} threshold={0.1}>
            <div className="img-block padded" style={{marginTop:60}}>
              <img src={ASSETS.userflow} alt="User flow diagram" loading="lazy" decoding="async" style={{width:"100%",display:"block"}} />
            </div>
          </SR>

          {/* User goals */}
          <div style={{padding:"60px 60px 0", display:"flex", flexDirection:"column", gap:60}}>
            <SR variants={fadeUp}>
              <p style={{fontWeight:500, fontSize:24, lineHeight:1.25}}>User goals</p>
            </SR>
            <div className="cards-row" style={{padding:0}}>
              {[
                { num: "01", text: "Discover what suits their needs (e.g., seasonal, organic, local) without having to scroll endlessly" },
                { num: "02", text: "Find clear information about the origin, condition, and availability of the fruits before making a purchase" },
                { num: "03", text: "Have a frustration-free experience — from browsing to checkout — with intuitive filters and minimal surprises" },
              ].map((c, i) => (
                <SR key={i} variants={fadeUp} custom={i} style={{ flex:1, minWidth:0, display:"flex" }}>
                  <div className="num-card">
                    <span className="nc-num">{c.num}</span>
                    <p className="nc-text">{c.text}</p>
                  </div>
                </SR>
              ))}
            </div>
          </div>

          {/* 03 UI Kit */}
          <div className="content">
            <SR variants={fadeUp}>
              <div className="content-block">
                <h2 className="cb-title"><span className="num" style={{marginRight:12}}>03</span>UI Kit</h2>
              </div>
            </SR>
          </div>
          <div className="ui-kit-grid">
            {[
              { src: ASSETS.uiColors, alt: "Color palette" },
              { src: ASSETS.uiTypography, alt: "Typography — Montserrat" },
              { src: ASSETS.uiFonts, alt: "Font weights" },
              { src: ASSETS.uiOranges, alt: "Visual identity — oranges" },
            ].map((img, i) => (
              <SR key={i} variants={scaleIn} custom={i}>
                <div className="ui-kit-cell">
                  <img src={img.src} alt={img.alt} loading="lazy" decoding="async" style={{width:"100%",display:"block"}} />
                </div>
              </SR>
            ))}
          </div>

          {/* 04 Visual design */}
          <div className="section-label-block">
            <SR variants={fadeUp} style={{width:"33.33%"}}>
              <div style={{display:"flex",gap:12}}>
                <span className="sl-label" style={{width:"auto", fontWeight:500, fontSize:32, letterSpacing:"-0.64px", color:"#D56442", fontStyle:"italic"}}>04</span>
                <span className="sl-label" style={{width:"auto", fontWeight:500, fontSize:32, letterSpacing:"-0.64px"}}>Visual design</span>
              </div>
            </SR>
            <SR variants={fadeUp} custom={1} style={{width:"66.66%"}}>
              <div className="sl-text">The hero section was designed to instantly communicate the brand's core values. I used bold typography, color contrast, and real fruit imagery to grab attention and build trust.</div>
            </SR>
          </div>
          <div className="img-row">
            <SR variants={scaleIn}><img src={ASSETS.visualMobile} alt="Mobile mockup" loading="lazy" decoding="async" style={{width:"100%",display:"block",borderRadius:4}} /></SR>
            <SR variants={scaleIn} custom={1}><img src={ASSETS.visualHero} alt="Desktop + mobile hero" loading="lazy" decoding="async" style={{width:"100%",display:"block",borderRadius:4}} /></SR>
          </div>

          {/* Product page */}
          <div className="section-label-block">
            <SR variants={fadeUp} style={{width:"33.33%"}}><div className="sl-label">Product page</div></SR>
            <SR variants={fadeUp} custom={1} style={{width:"66.66%"}}><div className="sl-text">Based on user research, I focused on improving product discoverability and decision-making. The page combines detailed product information, visual content, and social proof to support a smooth path to purchase.</div></SR>
          </div>
          <SR variants={scaleIn} threshold={0.1}>
            <div className="img-block padded" style={{marginTop:60}}>
              <img src={ASSETS.productPage} alt="Product page — Cherry" loading="lazy" decoding="async" style={{width:"100%",display:"block"}} />
            </div>
          </SR>

          {/* Blog page */}
          <div className="section-label-block">
            <SR variants={fadeUp} style={{width:"33.33%"}}><div className="sl-label">Blog page</div></SR>
            <SR variants={fadeUp} custom={1} style={{width:"66.66%"}}><div className="sl-text">The blog experience was designed to extend the user journey beyond shopping by providing educational and inspirational content that supports healthy lifestyle goals. By connecting articles with relevant products, users can seamlessly move between discovering information and taking action.</div></SR>
          </div>
          <SR variants={scaleIn} threshold={0.1}>
            <div className="img-block padded" style={{marginTop:60}}>
              <img src={ASSETS.blogPage} alt="Blog page — Berry Smoothies" loading="lazy" decoding="async" style={{width:"100%",display:"block"}} />
            </div>
          </SR>

          {/* Footer */}
          <footer className="footer">
            <div className="footer-top">
              <div className="footer-cta">let's<br/>talk</div>
              <div className="footer-right">
                <SR variants={fadeIn} custom={1}>
                  <div className="footer-socials">
                    <a className="social-link filled" href="mailto:nastia.biriukova@gmail.com"><MailIcon color="#0F0F0F" /> Mail</a>
                    <a className="social-link outlined" href="https://www.linkedin.com/in/ana-biriukova/" target="_blank" rel="noopener">LinkedIn</a>
                    <a className="social-link outlined" href="https://dribbble.com/Biriukova77" target="_blank" rel="noopener"><DribbbleIcon /> Dribble</a>
                  </div>
                </SR>
                <SR variants={fadeUp} custom={2}><p className="footer-availability">Available for full-time and part-time roles, freelance projects, or casual coffee chats in Berlin.</p></SR>
              </div>
            </div>
            <SR variants={fadeIn}><div className="footer-bottom"><span>&copy; By Anastasiia Biriukova</span><span>2026</span></div></SR>
          </footer>

      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
